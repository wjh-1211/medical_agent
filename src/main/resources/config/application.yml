runtime:
  environment: local
  maxReActLoops: 3
  toolLoggingEnabled: true

tracing:
  enabled: true
  maxPayloadCharacters: 320
  slowCallMillis: 1000

swarm:
  enabled: false
  maxRoles: 4
  maxPlanSteps: 4
  roleTimeoutMillis: 3000
  fallbackToSingleAgent: true

api:
  enabled: true
  host: 127.0.0.1
  port: 8080
  basePath: /api/agent
  requestTimeoutMillis: 8000

session:
  autoCreateSessionId: true
  allowAnonymousUser: true
  anonymousUserIdPrefix: anonymous

prompt:
  directory: prompts
  defaultTemplate: medical-agent-react
  fileExtension: .prompt.md
  strictVariables: true

model:
  provider: python_transformers
  name: qwen3
  path: /mnt/Data/multi-agent/DeepSeek-R1-Distill-Qwen-7B
  pythonExecutable: python3
  launcherScript: scripts/local_model_inference.py
  temperature: 0.2
  maxTokens: 128
  functionCallingEnabled: true

memory:
  sessionStore: in_memory
  sessionTtlMinutes: 30
  longTermStore: sqlite
  longTermSqlitePath: data/medical-agent.db
  summaryStore: sqlite
  summarySqlitePath: data/medical-agent.db
  preferenceStore: mysql

knowledge:
  enabled: true
  documentsDirectory: knowledge
  indexSqlitePath: data/knowledge-index.db
  embeddingProvider: python_transformers
  embeddingModelPath: /mnt/Data/multi-agent/Qwen/Qwen3-Embedding-4B
  embeddingPythonExecutable: python3
  embeddingLauncherScript: scripts/local_embedding_inference.py
  embeddingDimension: 1024
  chunkMaxCharacters: 700
  chunkOverlapCharacters: 100
  defaultTopK: 3
  minScore: 0.35
  retrievalStrategy: vector
  hybridCandidateMultiplier: 3
  rrfK: 60
  rerankEnabled: true
  hybridRequireLexicalMatch: true
  queryInstruction: Given a medical knowledge question, retrieve relevant passages that answer the question

context:
  summaryEnabled: true
  summaryUpdateMinHistoryMessages: 4
  longTermMemoryMaxCharacters: 1200
  sessionMemoryMaxCharacters: 800
  summaryMemoryMaxCharacters: 1200
  recentHistoryMaxMessages: 4
  recentHistoryMaxCharacters: 1800
  toolFactsMaxCharacters: 1000
  observationsMaxMessages: 2
  observationsMaxCharacters: 1000

guardrail:
  emergencyDetectionEnabled: true
  riskAssessmentEnabled: true
  groundingCheckEnabled: true
  autoDisclaimerEnabled: true
  blockOnDecisionFailure: true
  emergencySafeAnswer: 当前描述可能存在紧急风险。请尽快联系当地急救服务或立即前往急诊；如身边有人，请让对方协助，不要独自驾驶。
  highRiskSafeAnswer: 当前信息提示需要尽快进行线下医疗评估。为避免延误或不恰当的个体化建议，请联系医生、药师或就近医疗机构进一步确认。
  insufficientEvidenceSafeAnswer: 当前可用信息或受控资料不足以支持确定性结论。请补充症状变化、持续时间、既往病史和正在使用的药物；如症状加重或出现危险信号，请及时就医。
  decisionFailureSafeAnswer: 当前无法完成必要的安全评估，因此不适合给出确定性医疗建议。请联系医生、药师或就近医疗机构进一步评估；如症状紧急，请立即寻求急救帮助。

timeout:
  modelCallMillis: 30000
  toolCallMillis: 3000
  memoryCallMillis: 2000

cache:
  enabled: false
  provider: none
  ttlSeconds: 0

skills:
  echoSkill:
    enabled: true
    toolName: echo_input
    implementation: com.medicalagent.skills.EchoSkill
    options:
      owner: framework
  uppercaseSkill:
    enabled: true
    toolName: uppercase_text
    implementation: com.medicalagent.skills.UppercaseSkill
    options:
      owner: framework
  memoryReadSkill:
    enabled: true
    toolName: session_memory_read
    implementation: com.medicalagent.skills.MemoryReadSkill
    options:
      owner: framework
  memoryWriteSkill:
    enabled: true
    toolName: session_memory_write
    implementation: com.medicalagent.skills.MemoryWriteSkill
    options:
      owner: framework
  longTermMemoryReadSkill:
    enabled: true
    toolName: long_term_memory_read
    implementation: com.medicalagent.skills.LongTermMemoryReadSkill
    options:
      owner: memory
  longTermMemoryWriteSkill:
    enabled: true
    toolName: long_term_memory_write
    implementation: com.medicalagent.skills.LongTermMemoryWriteSkill
    options:
      owner: memory
  summaryMemoryReadSkill:
    enabled: true
    toolName: summary_memory_read
    implementation: com.medicalagent.skills.SummaryMemoryReadSkill
    options:
      owner: memory
  summaryMemoryWriteSkill:
    enabled: true
    toolName: summary_memory_write
    implementation: com.medicalagent.skills.SummaryMemoryWriteSkill
    options:
      owner: memory
  knowledgeSearchSkill:
    enabled: true
    toolName: knowledge_search
    implementation: com.medicalagent.skills.KnowledgeSearchSkill
    options:
      owner: knowledge
  emergencyDetectionSkill:
    enabled: true
    toolName: emergency_detection
    implementation: com.medicalagent.skills.EmergencyDetectionSkill
    options:
      owner: safety
  riskAssessmentSkill:
    enabled: true
    toolName: risk_assessment
    implementation: com.medicalagent.skills.RiskAssessmentSkill
    options:
      owner: safety
  groundingCheckSkill:
    enabled: true
    toolName: grounding_check
    implementation: com.medicalagent.skills.GroundingCheckSkill
    options:
      owner: safety
