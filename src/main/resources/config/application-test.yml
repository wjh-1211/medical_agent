runtime:
  environment: test
  maxReActLoops: 3

prompt:
  defaultTemplate: medical-agent-react

model:
  provider: stub
  name: qwen3-test
  path: /tmp/stub-model
  temperature: 0.0
  maxTokens: 256
  pythonExecutable: python3
  launcherScript: scripts/local_model_inference.py

timeout:
  modelCallMillis: 5000
  toolCallMillis: 1000
  memoryCallMillis: 1000

memory:
  longTermStore: sqlite
  longTermSqlitePath: target/test-long-term-memory.db
  summaryStore: sqlite
  summarySqlitePath: target/test-summary-memory.db

knowledge:
  enabled: true
  documentsDirectory: src/test/resources/knowledge
  indexSqlitePath: target/test-knowledge-index.db
  embeddingProvider: hash
  embeddingDimension: 64
  chunkMaxCharacters: 180
  chunkOverlapCharacters: 20
  defaultTopK: 2
  minScore: -1.0
